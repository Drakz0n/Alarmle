name: alarmle
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.6.0
  alarm: ^4.0.0
  permission_handler: ^11.3.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  connectivity_plus: ^7.2.0
  image_picker: ^1.2.2
  google_sign_in: ^7.2.0
  file_picker: ^9.0.0
  path_provider: ^2.1.5
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.4.0
  flutter_launcher_icons: ^0.14.3


dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.22

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/aqui_iran_imagenes.txt
    - assets/fonts/aqui_iran_fuentes.txt
    - assets/icons/aqui_iran_iconos.txt
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true